name: Seed — Equity Historical Bars (20 years)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    # Up to ~30 min for 600+ symbols × 20 years
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync

      - name: Seed equity bars
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: uv run python scripts/seed_equity_bars.py
