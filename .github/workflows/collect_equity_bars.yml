name: Collect — Daily Equity Bars

on:
  schedule:
    # 8pm ET Mon–Fri (1am UTC Tue–Sat)
    - cron: "0 1 * * 2-6"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync

      - name: Collect equity bars
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: uv run python scripts/collect/equity_bars.py
