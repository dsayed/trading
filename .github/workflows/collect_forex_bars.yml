name: Collect — Daily Forex Bars

on:
  schedule:
    # 6pm ET Mon–Fri (11pm UTC Mon–Fri)
    - cron: "0 23 * * 1-5"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync

      - name: Collect forex bars
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: uv run python scripts/collect/forex_bars.py
